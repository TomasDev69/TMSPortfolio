<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2CACC9"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3a2e"/>
      <stop offset="1" stop-color="#0a2f47"/>
    </linearGradient>
    <linearGradient id="hdd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f4f6b"/>
      <stop offset="1" stop-color="#0a2f47"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- OFFLINE badge -->
  <g transform="translate(980,150)">
    <rect x="0" y="0" width="155" height="56" rx="28" fill="#0a2f47" stroke="#FF6B6B" stroke-width="2.5"/>
    <circle cx="34" cy="28" r="9" fill="#FF6B6B"/>
    <text x="58" y="36" fill="#FF6B6B" font-size="20" font-weight="700">OFFLINE</text>
  </g>

  <!-- Raspberry Pi 5 board -->
  <g transform="translate(120,200)">
    <rect x="0" y="0" width="280" height="220" rx="16" fill="url(#board)" stroke="#1f6b4f" stroke-width="2"/>
    <!-- SoC / chip -->
    <g transform="translate(80,50)">
      <rect x="0" y="0" width="100" height="80" rx="8" fill="#0a2f47" stroke="#2CACC9" stroke-width="2"/>
      <!-- chip traces -->
      <g stroke="#16557a" stroke-width="2">
        <line x1="20" y1="0" x2="20" y2="-10"/><line x1="40" y1="0" x2="40" y2="-10"/>
        <line x1="60" y1="0" x2="60" y2="-10"/><line x1="80" y1="0" x2="80" y2="-10"/>
        <line x1="20" y1="80" x2="20" y2="90"/><line x1="40" y1="80" x2="40" y2="90"/>
        <line x1="60" y1="80" x2="60" y2="90"/><line x1="80" y1="80" x2="80" y2="90"/>
      </g>
      <text x="50" y="46" text-anchor="middle" fill="#2CACC9" font-size="14" font-weight="600">RPI 5</text>
    </g>
    <!-- GPIO pins -->
    <g fill="#3DDC84">
      <circle cx="20" cy="190" r="3.5"/><circle cx="35" cy="190" r="3.5"/>
      <circle cx="50" cy="190" r="3.5"/><circle cx="65" cy="190" r="3.5"/>
      <circle cx="80" cy="190" r="3.5"/><circle cx="95" cy="190" r="3.5"/>
      <circle cx="110" cy="190" r="3.5"/><circle cx="125" cy="190" r="3.5"/>
    </g>
    <!-- power LED -->
    <circle cx="250" cy="25" r="6" fill="#3DDC84"/>
    <text x="14" y="28" fill="#7fd9b6" font-size="14" font-weight="600">RASPBERRY PI 5</text>
    <!-- SD card slot (open) -->
    <g transform="translate(190,145)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="#06283c" stroke="#2CACC9" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="35" y="22" text-anchor="middle" fill="#2CACC9" font-size="10" font-weight="600">SD</text>
      <text x="35" y="38" text-anchor="middle" fill="#6f97ab" font-size="9">INSERT</text>
    </g>
  </g>

  <!-- micro SD card (being inserted) -->
  <g transform="translate(340,310)">
    <rect x="0" y="0" width="60" height="44" rx="4" fill="#1f4f6b" stroke="#2CACC9" stroke-width="2"/>
    <rect x="6" y="6" width="8" height="14" rx="1" fill="#2CACC9" opacity=".3"/>
    <rect x="18" y="6" width="8" height="14" rx="1" fill="#2CACC9" opacity=".3"/>
    <rect x="30" y="6" width="8" height="14" rx="1" fill="#2CACC9" opacity=".3"/>
    <text x="30" y="38" text-anchor="middle" fill="#86b9cf" font-size="9">microSD</text>
    <!-- insert arrow -->
    <polygon points="-14,22 -28,14 -28,30" fill="#2CACC9" opacity=".7"/>
  </g>

  <!-- data stream lines -->
  <g stroke="url(#flow)" stroke-width="3" fill="none" opacity=".8">
    <path d="M400 280 C 480 280, 520 220, 600 220"/>
    <path d="M400 340 C 500 340, 540 360, 600 360"/>
    <path d="M400 380 C 500 380, 520 440, 600 440"/>
  </g>
  <!-- folder labels on streams -->
  <g>
    <rect x="470" y="206" width="70" height="24" rx="6" fill="#7C5CFF" opacity=".2"/>
    <text x="505" y="224" text-anchor="middle" fill="#7C5CFF" font-size="14" font-weight="600">DCIM</text>
    <rect x="490" y="346" width="56" height="24" rx="6" fill="#2CACC9" opacity=".2"/>
    <text x="518" y="364" text-anchor="middle" fill="#2CACC9" font-size="14" font-weight="600">DJI</text>
    <rect x="475" y="430" width="100" height="24" rx="6" fill="#3DDC84" opacity=".15"/>
    <text x="525" y="448" text-anchor="middle" fill="#3DDC84" font-size="13" font-weight="600">2026/06/25</text>
  </g>

  <!-- external hard drive -->
  <g transform="translate(640,180)">
    <rect x="0" y="0" width="380" height="300" rx="18" fill="url(#hdd)" stroke="#1f4f6b" stroke-width="2.5"/>
    <!-- drive label -->
    <text x="190" y="36" text-anchor="middle" fill="#86b9cf" font-size="18" font-weight="500">External Hard Drive</text>
    <!-- folder tree -->
    <g transform="translate(30,56)">
      <!-- 2026 folder -->
      <rect x="0" y="0" width="320" height="40" rx="8" fill="#06283c"/>
      <rect x="12" y="10" width="22" height="18" rx="4" fill="none" stroke="#FFC857" stroke-width="2"/>
      <rect x="12" y="8" width="14" height="6" rx="2" fill="#FFC857" opacity=".5"/>
      <text x="44" y="26" fill="#FFC857" font-size="16" font-weight="600">2026/</text>
      <!-- June subfolder -->
      <rect x="24" y="48" width="296" height="36" rx="8" fill="#06283c"/>
      <rect x="40" y="56" width="18" height="16" rx="3" fill="none" stroke="#2CACC9" stroke-width="2"/>
      <rect x="40" y="54" width="12" height="5" rx="2" fill="#2CACC9" opacity=".5"/>
      <text x="68" y="72" fill="#2CACC9" font-size="15" font-weight="500">06/</text>
      <!-- Day subfolders -->
      <rect x="48" y="92" width="272" height="32" rx="6" fill="#06283c"/>
      <rect x="60" y="100" width="16" height="14" rx="3" fill="none" stroke="#3DDC84" stroke-width="1.5"/>
      <text x="86" y="114" fill="#3DDC84" font-size="14">25/ <tspan fill="#6f97ab">IMG_0012.jpg, DJI_0034.mp4...</tspan></text>
      <rect x="48" y="130" width="272" height="32" rx="6" fill="#06283c"/>
      <rect x="60" y="138" width="16" height="14" rx="3" fill="none" stroke="#3DDC84" stroke-width="1.5"/>
      <text x="86" y="152" fill="#3DDC84" font-size="14">24/ <tspan fill="#6f97ab">IMG_0008.jpg, DJI_0029.mp4...</tspan></text>
      <rect x="48" y="168" width="272" height="32" rx="6" fill="#06283c"/>
      <rect x="60" y="176" width="16" height="14" rx="3" fill="none" stroke="#3DDC84" stroke-width="1.5"/>
      <text x="86" y="190" fill="#3DDC84" font-size="14">23/ <tspan fill="#6f97ab">IMG_0001.jpg, DJI_0015.mp4...</tspan></text>
    </g>
    <!-- HDD activity LED -->
    <circle cx="350" cy="270" r="5" fill="#2CACC9"/>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="52" font-weight="700">RPI 5 SD Harvester</text>
  <text x="123" y="595" fill="#2CACC9" font-size="26" font-weight="500" letter-spacing="1">Auto-detect · verify · organize · always offline</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Boot-triggered scripts harvest DCIM and DJI folders into date-sorted archives</text>
</svg>
