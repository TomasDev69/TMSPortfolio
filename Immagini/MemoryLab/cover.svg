<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2CACC9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2CACC9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2CACC9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="90" cy="70" r="1.4" opacity=".7"/><circle cx="220" cy="40" r="1" opacity=".5"/>
    <circle cx="380" cy="90" r="1.2" opacity=".6"/><circle cx="1040" cy="60" r="1.6" opacity=".8"/>
    <circle cx="1120" cy="150" r="1" opacity=".5"/><circle cx="980" cy="120" r="1.2" opacity=".6"/>
    <circle cx="150" cy="600" r="1.3" opacity=".6"/><circle cx="1080" cy="560" r="1.5" opacity=".7"/>
    <circle cx="640" cy="40" r="1" opacity=".5"/><circle cx="60" cy="320" r="1.1" opacity=".5"/>
    <circle cx="1150" cy="400" r="1.2" opacity=".6"/><circle cx="500" cy="620" r="1" opacity=".5"/>
  </g>

  <!-- memory thumbnail grid -->
  <g transform="translate(120,150)">
    <!-- row 1 -->
    <g>
      <rect x="0" y="0" width="170" height="130" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <circle cx="60" cy="55" r="22" fill="none" stroke="#2CACC9" stroke-width="3"/>
      <circle cx="60" cy="48" r="8" fill="#2CACC9"/>
      <path d="M44 70 q16 -16 32 0" fill="none" stroke="#2CACC9" stroke-width="3"/>
      <rect x="14" y="100" width="90" height="8" rx="4" fill="#16557a"/>
      <text x="120" y="118" fill="#86b9cf" font-size="13">FACE</text>
    </g>
    <g transform="translate(190,0)">
      <rect x="0" y="0" width="170" height="130" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <polygon points="62,42 62,88 102,65" fill="#7C5CFF"/>
      <rect x="14" y="100" width="110" height="8" rx="4" fill="#16557a"/>
      <text x="120" y="118" fill="#86b9cf" font-size="13">VIDEO</text>
    </g>
    <g transform="translate(380,0)">
      <rect x="0" y="0" width="170" height="130" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <rect x="40" y="34" width="90" height="62" rx="6" fill="none" stroke="#2CACC9" stroke-width="3"/>
      <line x1="40" y1="52" x2="130" y2="52" stroke="#2CACC9" stroke-width="3"/>
      <line x1="58" y1="28" x2="58" y2="40" stroke="#2CACC9" stroke-width="3"/>
      <line x1="112" y1="28" x2="112" y2="40" stroke="#2CACC9" stroke-width="3"/>
      <text x="118" y="118" fill="#86b9cf" font-size="13">DATE</text>
    </g>
    <!-- row 2 -->
    <g transform="translate(0,150)">
      <rect x="0" y="0" width="170" height="130" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <circle cx="50" cy="55" r="16" fill="none" stroke="#7C5CFF" stroke-width="3"/>
      <circle cx="86" cy="55" r="16" fill="none" stroke="#2CACC9" stroke-width="3"/>
      <text x="120" y="60" fill="#86b9cf" font-size="13">2 ppl</text>
      <rect x="14" y="100" width="80" height="8" rx="4" fill="#16557a"/>
    </g>
    <g transform="translate(190,150)">
      <rect x="0" y="0" width="170" height="130" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <path d="M30 90 L70 50 L100 80 L140 40" fill="none" stroke="#2CACC9" stroke-width="3"/>
      <circle cx="140" cy="40" r="5" fill="#7C5CFF"/>
      <text x="14" y="118" fill="#86b9cf" font-size="13">SCENE</text>
    </g>
    <g transform="translate(380,150)">
      <rect x="0" y="0" width="170" height="130" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <rect x="36" y="36" width="98" height="58" rx="6" fill="#16557a" opacity=".6"/>
      <circle cx="60" cy="58" r="8" fill="#2CACC9"/>
      <path d="M36 94 L70 66 L96 86 L134 56 L134 94 Z" fill="#0a2f47"/>
      <text x="14" y="118" fill="#86b9cf" font-size="13">PHOTO</text>
    </g>
    <!-- scanning beam -->
    <rect x="-10" y="118" width="570" height="44" fill="url(#scan)"/>
  </g>

  <!-- privacy lock badge -->
  <g transform="translate(760,210)">
    <circle cx="170" cy="120" r="160" fill="#2CACC9" opacity=".06" filter="url(#soft)"/>
    <g transform="translate(120,60)">
      <rect x="0" y="50" width="100" height="78" rx="14" fill="#0a2f47" stroke="url(#accent)" stroke-width="3"/>
      <path d="M18 50 v-14 a32 32 0 0 1 64 0 v14" fill="none" stroke="url(#accent)" stroke-width="8"/>
      <circle cx="50" cy="86" r="9" fill="#2CACC9"/>
      <rect x="46" y="92" width="8" height="20" rx="4" fill="#2CACC9"/>
    </g>
    <text x="170" y="230" text-anchor="middle" fill="#86b9cf" font-size="20" letter-spacing="3">100% LOCAL</text>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="58" font-weight="700">MemoryLab</text>
  <text x="123" y="595" fill="#2CACC9" font-size="26" font-weight="500" letter-spacing="1">Local vision model · catalogues every memory on your drive</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Faces, scenes, dates, descriptions: searchable, fully offline</text>
</svg>
