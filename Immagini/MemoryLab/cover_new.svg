<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <linearGradient id="secret" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4D6D"/>
      <stop offset="1" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- camera body -->
  <g transform="translate(140,180)">
    <rect x="0" y="40" width="360" height="240" rx="20" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2.5"/>
    <!-- viewfinder bump -->
    <rect x="120" y="0" width="120" height="50" rx="10" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <rect x="145" y="10" width="70" height="28" rx="6" fill="#06283c" stroke="#16557a" stroke-width="1.5"/>
    <!-- shutter button -->
    <circle cx="300" cy="20" r="16" fill="#0a2f47" stroke="url(#lens)" stroke-width="3"/>
    <circle cx="300" cy="20" r="8" fill="#7C5CFF" opacity=".4"/>
    <!-- lens mount -->
    <circle cx="180" cy="170" r="90" fill="#06283c" stroke="#1f4f6b" stroke-width="3"/>
    <circle cx="180" cy="170" r="72" fill="none" stroke="url(#lens)" stroke-width="2"/>
    <circle cx="180" cy="170" r="54" fill="none" stroke="#2CACC9" stroke-width="1.5" opacity=".6"/>
    <circle cx="180" cy="170" r="36" fill="none" stroke="#7C5CFF" stroke-width="1.5" opacity=".5"/>
    <circle cx="180" cy="170" r="20" fill="#7C5CFF" opacity=".15"/>
    <!-- lens reflection -->
    <circle cx="160" cy="150" r="12" fill="#2CACC9" opacity=".08" filter="url(#soft)"/>
    <!-- aperture blades (simplified) -->
    <g stroke="#16557a" stroke-width="1.5" fill="none" opacity=".4">
      <line x1="156" y1="140" x2="180" y2="150"/>
      <line x1="204" y1="140" x2="180" y2="150"/>
      <line x1="210" y1="170" x2="196" y2="160"/>
      <line x1="204" y1="200" x2="180" y2="190"/>
      <line x1="156" y1="200" x2="180" y2="190"/>
      <line x1="150" y1="170" x2="164" y2="160"/>
    </g>
    <!-- status LEDs -->
    <circle cx="30" cy="60" r="5" fill="#FF6B6B"/>
    <circle cx="50" cy="60" r="5" fill="#FFC857" opacity=".6"/>
  </g>

  <!-- circuit board / schematics -->
  <g transform="translate(580,200)">
    <rect x="0" y="0" width="480" height="260" rx="14" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <text x="240" y="30" text-anchor="middle" fill="#86b9cf" font-size="16" font-weight="500">Hardware Schematics</text>
    <!-- circuit traces -->
    <g stroke="#16557a" stroke-width="2" fill="none">
      <path d="M40 60 h80 v40 h60"/>
      <path d="M40 80 h40 v60 h100"/>
      <path d="M40 100 h20 v80 h140"/>
      <path d="M280 60 h-60 v30 h-30"/>
      <path d="M280 90 h-40 v50"/>
      <path d="M360 120 h80 v40"/>
      <path d="M360 160 h60"/>
    </g>
    <!-- IC chips -->
    <rect x="180" y="80" width="60" height="50" rx="6" fill="#06283c" stroke="#2CACC9" stroke-width="2"/>
    <text x="210" y="110" text-anchor="middle" fill="#2CACC9" font-size="11" font-weight="600">ISP</text>
    <rect x="300" y="60" width="50" height="40" rx="6" fill="#06283c" stroke="#7C5CFF" stroke-width="2"/>
    <text x="325" y="86" text-anchor="middle" fill="#7C5CFF" font-size="11" font-weight="600">DSP</text>
    <!-- sensor -->
    <rect x="80" y="150" width="80" height="70" rx="8" fill="#06283c" stroke="url(#lens)" stroke-width="2"/>
    <rect x="95" y="165" width="50" height="40" rx="4" fill="#7C5CFF" opacity=".12"/>
    <text x="120" y="190" text-anchor="middle" fill="#7C5CFF" font-size="12" font-weight="600">SENSOR</text>
    <!-- resistors/caps -->
    <g fill="#16557a">
      <rect x="360" y="190" width="14" height="8" rx="2"/><rect x="390" y="190" width="14" height="8" rx="2"/>
      <rect x="420" y="190" width="14" height="8" rx="2"/><rect x="360" y="210" width="14" height="8" rx="2"/>
    </g>
    <!-- placeholder text blocks (research notes) -->
    <rect x="260" y="140" width="100" height="8" rx="4" fill="#16557a" opacity=".5"/>
    <rect x="260" y="154" width="80" height="8" rx="4" fill="#16557a" opacity=".4"/>
    <rect x="260" y="168" width="120" height="8" rx="4" fill="#16557a" opacity=".3"/>
    <text x="240" y="240" text-anchor="middle" fill="#6f97ab" font-size="13">Full schematics archived · ready for future build</text>
  </g>

  <!-- TOP SECRET stamp -->
  <g transform="translate(300,290) rotate(-12)">
    <rect x="0" y="0" width="600" height="100" rx="8" fill="none" stroke="url(#secret)" stroke-width="6" opacity=".85"/>
    <rect x="10" y="10" width="580" height="80" rx="4" fill="none" stroke="url(#secret)" stroke-width="2" opacity=".5"/>
    <text x="300" y="72" text-anchor="middle" fill="#FF4D6D" font-size="64" font-weight="700" letter-spacing="8" opacity=".9">TOP SECRET</text>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="52" font-weight="700">Memories Lab / Cam</text>
  <text x="123" y="595" fill="#FF4D6D" font-size="26" font-weight="500" letter-spacing="1">Classified · hardware + software · future startup potential</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Ambitious project, fully archived with schematics and research complete</text>
</svg>
