<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3a2e"/>
      <stop offset="1" stop-color="#0a2f47"/>
    </linearGradient>
    <linearGradient id="on" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <pattern id="checker" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#0a2f47"/>
      <rect width="10" height="10" fill="#10405e"/>
      <rect x="10" y="10" width="10" height="10" fill="#10405e"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- 24/7 badge -->
  <g transform="translate(980,150)">
    <rect x="0" y="0" width="150" height="56" rx="28" fill="#0a2f47" stroke="url(#on)" stroke-width="2.5"/>
    <circle cx="34" cy="28" r="9" fill="#3DDC84"/>
    <text x="58" y="37" fill="#3DDC84" font-size="26" font-weight="700">24/7</text>
  </g>

  <!-- Jetson dev board -->
  <g transform="translate(130,250)">
    <rect x="0" y="0" width="260" height="200" rx="16" fill="url(#board)" stroke="#1f6b4f" stroke-width="2"/>
    <!-- heatsink fins -->
    <g transform="translate(70,40)">
      <rect x="0" y="0" width="120" height="90" rx="8" fill="#0a2f47" stroke="#2CACC9" stroke-width="2"/>
      <g stroke="#16557a" stroke-width="6">
        <line x1="14" y1="10" x2="14" y2="80"/><line x1="34" y1="10" x2="34" y2="80"/>
        <line x1="54" y1="10" x2="54" y2="80"/><line x1="74" y1="10" x2="74" y2="80"/>
        <line x1="94" y1="10" x2="94" y2="80"/><line x1="106" y1="10" x2="106" y2="80"/>
      </g>
      <rect x="40" y="34" width="40" height="22" rx="3" fill="#2CACC9" opacity=".5"/>
    </g>
    <!-- pins -->
    <g fill="#3DDC84"><circle cx="20" cy="170" r="4"/><circle cx="40" cy="170" r="4"/><circle cx="60" cy="170" r="4"/><circle cx="80" cy="170" r="4"/></g>
    <circle cx="235" cy="25" r="6" fill="#3DDC84"/>
    <text x="14" y="28" fill="#7fd9b6" font-size="16" font-weight="600">JETSON ORIN NANO</text>
  </g>

  <!-- connections -->
  <g stroke="#2CACC9" stroke-width="3" fill="none" opacity=".8">
    <path d="M390 300 C 480 300, 480 250, 560 250"/>
    <path d="M390 400 C 480 400, 480 470, 560 470"/>
  </g>

  <!-- database cylinder -->
  <g transform="translate(580,190)">
    <ellipse cx="60" cy="14" rx="60" ry="18" fill="#0a2f47" stroke="#2CACC9" stroke-width="2.5"/>
    <path d="M0 14 v92 a60 18 0 0 0 120 0 v-92" fill="#0a2f47" stroke="#2CACC9" stroke-width="2.5"/>
    <ellipse cx="60" cy="52" rx="60" ry="18" fill="none" stroke="#16557a" stroke-width="2"/>
    <ellipse cx="60" cy="90" rx="60" ry="18" fill="none" stroke="#16557a" stroke-width="2"/>
    <text x="60" y="148" text-anchor="middle" fill="#86b9cf" font-size="18">Database</text>
  </g>

  <!-- t-shirt + bg-remove (checker = transparency) -->
  <g transform="translate(560,380)">
    <rect x="-6" y="-6" width="172" height="152" rx="10" fill="url(#checker)" stroke="#16557a" stroke-width="2"/>
    <path d="M55 10 L80 0 L105 10 L150 30 L132 60 L120 52 L120 138 L40 138 L40 52 L28 60 L10 30 Z"
          fill="#0a2f47" stroke="url(#on)" stroke-width="3" stroke-linejoin="round"/>
    <text x="78" y="92" text-anchor="middle" fill="#3DDC84" font-size="30" font-weight="700">U</text>
    <text x="80" y="172" text-anchor="middle" fill="#86b9cf" font-size="18">Custom tee · BG removed</text>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="52" font-weight="700">Unfiltered Server</text>
  <text x="123" y="150" fill="#3DDC84" font-size="24" font-weight="500" letter-spacing="1">Jetson Orin Nano · always-on backend</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Per-user custom tees · local background remover · small, secure, 24/7</text>
</svg>
