<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2f47"/>
      <stop offset="1" stop-color="#06283c"/>
    </linearGradient>
    <linearGradient id="safe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- shield with checkmark -->
  <g transform="translate(150,170)">
    <ellipse cx="150" cy="170" rx="170" ry="170" fill="#3DDC84" opacity=".07" filter="url(#glow)"/>
    <path d="M150 20 L280 60 V190 C280 280 215 320 150 345 C85 320 20 280 20 190 V60 Z"
          fill="url(#shield)" stroke="url(#safe)" stroke-width="4"/>
    <path d="M95 175 L138 220 L215 120" fill="none" stroke="url(#safe)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- breached account rows -->
  <g transform="translate(600,200)">
    <text x="0" y="-18" fill="#FF6B6B" font-size="20" letter-spacing="2">BREACHED → SECURED</text>
    <!-- row template -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="440" height="56" rx="10" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <circle cx="32" cy="28" r="14" fill="none" stroke="#FF6B6B" stroke-width="3"/>
      <line x1="24" y1="20" x2="40" y2="36" stroke="#FF6B6B" stroke-width="3"/>
      <line x1="40" y1="20" x2="24" y2="36" stroke="#FF6B6B" stroke-width="3"/>
      <rect x="58" y="16" width="180" height="10" rx="5" fill="#16557a"/>
      <rect x="58" y="32" width="120" height="8" rx="4" fill="#0f3f5c"/>
      <rect x="350" y="14" width="74" height="28" rx="14" fill="#3DDC84" opacity=".18"/>
      <path d="M364 28 l8 9 l16 -18" fill="none" stroke="#3DDC84" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(0,72)">
      <rect x="0" y="0" width="440" height="56" rx="10" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <circle cx="32" cy="28" r="14" fill="none" stroke="#FFC857" stroke-width="3"/>
      <text x="32" y="35" text-anchor="middle" fill="#FFC857" font-size="20" font-weight="700">!</text>
      <rect x="58" y="16" width="150" height="10" rx="5" fill="#16557a"/>
      <rect x="58" y="32" width="100" height="8" rx="4" fill="#0f3f5c"/>
      <rect x="330" y="14" width="94" height="28" rx="14" fill="#2CACC9" opacity=".18"/>
      <text x="377" y="33" text-anchor="middle" fill="#2CACC9" font-size="14" font-weight="600">RESET</text>
    </g>
    <g transform="translate(0,144)">
      <rect x="0" y="0" width="440" height="56" rx="10" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
      <!-- key icon -->
      <circle cx="30" cy="28" r="10" fill="none" stroke="#2CACC9" stroke-width="3"/>
      <line x1="38" y1="32" x2="56" y2="42" stroke="#2CACC9" stroke-width="3"/>
      <line x1="50" y1="38" x2="46" y2="46" stroke="#2CACC9" stroke-width="3"/>
      <rect x="72" y="16" width="170" height="10" rx="5" fill="#16557a"/>
      <rect x="72" y="32" width="110" height="8" rx="4" fill="#0f3f5c"/>
      <rect x="350" y="14" width="74" height="28" rx="14" fill="#3DDC84" opacity=".18"/>
      <path d="M364 28 l8 9 l16 -18" fill="none" stroke="#3DDC84" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="56" font-weight="700">pwnedRecovery</text>
  <text x="123" y="595" fill="#2CACC9" font-size="26" font-weight="500" letter-spacing="1">After the breach: recover, rotate, lock down</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Picks up where haveibeenpwned stops: audits accounts and guides password resets</text>
</svg>
