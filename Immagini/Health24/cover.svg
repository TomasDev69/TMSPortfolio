<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="health" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFC857"/>
      <stop offset="1" stop-color="#FF6B6B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- smartphone with meal photo -->
  <g transform="translate(120,160)">
    <rect x="0" y="0" width="180" height="320" rx="20" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2.5"/>
    <!-- screen -->
    <rect x="12" y="40" width="156" height="240" rx="6" fill="#06283c"/>
    <!-- meal plate circle -->
    <circle cx="90" cy="140" r="50" fill="#0a2f47" stroke="#16557a" stroke-width="2"/>
    <circle cx="90" cy="140" r="38" fill="#0d3a2e" opacity=".6"/>
    <!-- food items (abstract) -->
    <circle cx="78" cy="128" r="10" fill="#3DDC84" opacity=".7"/>
    <circle cx="102" cy="132" r="8" fill="#FFC857" opacity=".7"/>
    <rect x="73" y="145" width="34" height="12" rx="6" fill="#2CACC9" opacity=".5"/>
    <!-- AI scan lines -->
    <line x1="40" y1="100" x2="140" y2="100" stroke="#2CACC9" stroke-width="1" opacity=".4"/>
    <line x1="40" y1="180" x2="140" y2="180" stroke="#2CACC9" stroke-width="1" opacity=".4"/>
    <!-- camera dot -->
    <circle cx="90" cy="20" r="5" fill="#16557a"/>
    <!-- home bar -->
    <rect x="60" y="296" width="60" height="6" rx="3" fill="#16557a"/>
    <!-- analysis label -->
    <rect x="24" y="210" width="132" height="28" rx="8" fill="#3DDC84" opacity=".12"/>
    <text x="90" y="230" text-anchor="middle" fill="#3DDC84" font-size="14" font-weight="600">ANALYZING...</text>
  </g>

  <!-- protein gauge -->
  <g transform="translate(400,180)">
    <circle cx="100" cy="100" r="90" fill="#3DDC84" opacity=".06" filter="url(#soft)"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#0a2f47" stroke-width="14"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#health)" stroke-width="14"
            stroke-dasharray="330 440" stroke-linecap="round" transform="rotate(-90 100 100)"/>
    <text x="100" y="92" text-anchor="middle" fill="#ffffff" font-size="36" font-weight="700">72g</text>
    <text x="100" y="116" text-anchor="middle" fill="#86b9cf" font-size="16">PROTEIN</text>
    <text x="100" y="220" text-anchor="middle" fill="#6f97ab" font-size="14">Daily target: 120g</text>
  </g>

  <!-- trend chart -->
  <g transform="translate(660,180)">
    <rect x="0" y="0" width="400" height="200" rx="14" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <!-- grid -->
    <g stroke="#16557a" stroke-width="1" opacity=".5">
      <line x1="40" y1="40" x2="40" y2="170"/><line x1="40" y1="170" x2="370" y2="170"/>
      <line x1="40" y1="105" x2="370" y2="105" stroke-dasharray="4 4"/>
      <line x1="40" y1="72" x2="370" y2="72" stroke-dasharray="4 4"/>
    </g>
    <!-- trend line -->
    <path d="M50 155 L100 140 L150 148 L200 120 L250 105 L300 85 L350 60" fill="none"
          stroke="url(#health)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- data dots -->
    <g fill="#3DDC84">
      <circle cx="50" cy="155" r="4.5"/><circle cx="100" cy="140" r="4.5"/>
      <circle cx="150" cy="148" r="4.5"/><circle cx="200" cy="120" r="4.5"/>
      <circle cx="250" cy="105" r="4.5"/><circle cx="300" cy="85" r="4.5"/>
      <circle cx="350" cy="60" r="4.5"/>
    </g>
    <text x="200" y="28" text-anchor="middle" fill="#86b9cf" font-size="16" font-weight="500">Weekly Intake Trend</text>
  </g>

  <!-- recipe suggestion card -->
  <g transform="translate(660,420)">
    <rect x="0" y="0" width="400" height="80" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <!-- egg icon -->
    <ellipse cx="50" cy="40" rx="16" ry="20" fill="none" stroke="#FFC857" stroke-width="3"/>
    <ellipse cx="50" cy="44" rx="10" ry="10" fill="#FFC857" opacity=".25"/>
    <text x="80" y="32" fill="#ffffff" font-size="17" font-weight="600">Scrambled Eggs Breakfast</text>
    <text x="80" y="54" fill="#86b9cf" font-size="14">+28g protein · Quick recipe</text>
    <rect x="320" y="20" width="60" height="40" rx="10" fill="#3DDC84" opacity=".15"/>
    <text x="350" y="46" text-anchor="middle" fill="#3DDC84" font-size="14" font-weight="700">TRY</text>
  </g>

  <!-- cheat meal badge -->
  <g transform="translate(400,420)">
    <rect x="0" y="0" width="220" height="80" rx="12" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <circle cx="40" cy="40" r="18" fill="none" stroke="url(#warn)" stroke-width="3"/>
    <text x="40" y="47" text-anchor="middle" fill="#FFC857" font-size="20" font-weight="700">!</text>
    <text x="72" y="32" fill="#FFC857" font-size="15" font-weight="600">Cheat Meals Left</text>
    <text x="72" y="56" fill="#ffffff" font-size="28" font-weight="700">2 <tspan fill="#6f97ab" font-size="16">/ week</tspan></text>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="58" font-weight="700">Health24</text>
  <text x="123" y="595" fill="#3DDC84" font-size="26" font-weight="500" letter-spacing="1">AI meal analysis · protein tracking · recipe suggestions</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Local AI server analyzes your meals and helps you reach your goals</text>
</svg>
