<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="vec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4D6D"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4D6D"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- LEFT: raster / pixelated star -->
  <g transform="translate(150,200)">
    <text x="60" y="-30" fill="#FF8da0" font-size="20" letter-spacing="2">RASTER</text>
    <g fill="#FF4D6D">
      <rect x="120" y="0"  width="30" height="30" opacity=".95"/>
      <rect x="90"  y="30" width="30" height="30" opacity=".9"/><rect x="120" y="30" width="30" height="30"/><rect x="150" y="30" width="30" height="30" opacity=".9"/>
      <rect x="0"   y="60" width="30" height="30" opacity=".6"/><rect x="30" y="60" width="30" height="30" opacity=".8"/><rect x="60" y="60" width="30" height="30" opacity=".9"/><rect x="90" y="60" width="30" height="30"/><rect x="120" y="60" width="30" height="30"/><rect x="150" y="60" width="30" height="30"/><rect x="180" y="60" width="30" height="30" opacity=".9"/><rect x="210" y="60" width="30" height="30" opacity=".8"/><rect x="240" y="60" width="30" height="30" opacity=".6"/>
      <rect x="30"  y="90" width="30" height="30" opacity=".8"/><rect x="60" y="90" width="30" height="30"/><rect x="90" y="90" width="30" height="30"/><rect x="120" y="90" width="30" height="30"/><rect x="150" y="90" width="30" height="30"/><rect x="180" y="90" width="30" height="30"/><rect x="210" y="90" width="30" height="30" opacity=".8"/>
      <rect x="60"  y="120" width="30" height="30" opacity=".9"/><rect x="90" y="120" width="30" height="30"/><rect x="120" y="120" width="30" height="30"/><rect x="150" y="120" width="30" height="30"/><rect x="180" y="120" width="30" height="30" opacity=".9"/>
      <rect x="30"  y="150" width="30" height="30" opacity=".7"/><rect x="90" y="150" width="30" height="30"/><rect x="150" y="150" width="30" height="30"/><rect x="210" y="150" width="30" height="30" opacity=".7"/>
      <rect x="60"  y="180" width="30" height="30" opacity=".8"/><rect x="180" y="180" width="30" height="30" opacity=".8"/>
    </g>
  </g>

  <!-- ARROW -->
  <g transform="translate(560,295)">
    <rect x="0" y="-8" width="80" height="16" rx="8" fill="url(#arrow)"/>
    <polygon points="78,-22 120,0 78,22" fill="url(#arrow)"/>
  </g>

  <!-- RIGHT: vector star with bezier nodes -->
  <g transform="translate(720,200)">
    <text x="60" y="-30" fill="#86d6e6" font-size="20" letter-spacing="2">VECTOR</text>
    <path d="M135 0 L170 80 L260 90 L195 150 L215 235 L135 190 L55 235 L75 150 L10 90 L100 80 Z"
          fill="none" stroke="url(#vec)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M135 0 L170 80 L260 90 L195 150 L215 235 L135 190 L55 235 L75 150 L10 90 L100 80 Z"
          fill="#2CACC9" opacity=".10"/>
    <!-- node handles -->
    <g fill="#001524" stroke="#2CACC9" stroke-width="3">
      <rect x="128" y="-7" width="14" height="14"/>
      <rect x="253" y="83" width="14" height="14"/>
      <rect x="208" y="228" width="14" height="14"/>
      <rect x="48" y="228" width="14" height="14"/>
      <rect x="3" y="83" width="14" height="14"/>
    </g>
    <g fill="#FF4D6D">
      <circle cx="170" cy="80" r="6"/><circle cx="195" cy="150" r="6"/>
      <circle cx="135" cy="190" r="6"/><circle cx="75" cy="150" r="6"/><circle cx="100" cy="80" r="6"/>
    </g>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="58" font-weight="700">Design Vectorizer</text>
  <text x="123" y="595" fill="#2CACC9" font-size="26" font-weight="500" letter-spacing="1">Auto-vectorise apparel designs · web GUI</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Built for the Unfiltered brand: no more tracing by hand in Inkscape</text>
</svg>
