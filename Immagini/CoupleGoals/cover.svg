<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Ubuntu, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04263a"/>
      <stop offset="0.55" stop-color="#001524"/>
      <stop offset="1" stop-color="#00101c"/>
    </linearGradient>
    <linearGradient id="userA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <linearGradient id="userB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4D6D"/>
      <stop offset="1" stop-color="#FFC857"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DDC84"/>
      <stop offset="1" stop-color="#2CACC9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="1.4" opacity=".7"/><circle cx="300" cy="40" r="1" opacity=".5"/>
    <circle cx="1040" cy="60" r="1.6" opacity=".8"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="980" cy="120" r="1.2" opacity=".6"/><circle cx="150" cy="600" r="1.3" opacity=".6"/>
    <circle cx="1080" cy="560" r="1.5" opacity=".7"/><circle cx="640" cy="40" r="1" opacity=".5"/>
    <circle cx="1150" cy="420" r="1.2" opacity=".6"/><circle cx="60" cy="360" r="1.1" opacity=".5"/>
  </g>

  <!-- User A panel -->
  <g transform="translate(120,170)">
    <rect x="0" y="0" width="380" height="320" rx="16" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <!-- avatar -->
    <circle cx="40" cy="36" r="18" fill="none" stroke="url(#userA)" stroke-width="3"/>
    <circle cx="40" cy="30" r="7" fill="#7C5CFF"/>
    <path d="M28 46 q12 -8 24 0" fill="none" stroke="#7C5CFF" stroke-width="2.5"/>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="700">User A</text>
    <!-- progress bar -->
    <rect x="20" y="72" width="340" height="20" rx="10" fill="#06283c"/>
    <rect x="20" y="72" width="252" height="20" rx="10" fill="url(#userA)" opacity=".5"/>
    <text x="340" y="88" text-anchor="end" fill="#7C5CFF" font-size="15" font-weight="700">74%</text>
    <!-- tasks -->
    <g transform="translate(20,110)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#3DDC84" stroke-width="2"/>
      <path d="M16 21 l4 4 l8 -8" fill="none" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="42" y="14" width="160" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="100" height="6" rx="3" fill="#0f3f5c"/>
    </g>
    <g transform="translate(20,160)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#3DDC84" stroke-width="2"/>
      <path d="M16 21 l4 4 l8 -8" fill="none" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="42" y="14" width="200" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="80" height="6" rx="3" fill="#0f3f5c"/>
    </g>
    <g transform="translate(20,210)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#16557a" stroke-width="2"/>
      <rect x="42" y="14" width="140" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="120" height="6" rx="3" fill="#0f3f5c"/>
    </g>
    <g transform="translate(20,260)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#16557a" stroke-width="2"/>
      <rect x="42" y="14" width="180" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="90" height="6" rx="3" fill="#0f3f5c"/>
    </g>
  </g>

  <!-- User B panel -->
  <g transform="translate(700,170)">
    <rect x="0" y="0" width="380" height="320" rx="16" fill="#0a2f47" stroke="#1f4f6b" stroke-width="2"/>
    <!-- avatar -->
    <circle cx="40" cy="36" r="18" fill="none" stroke="url(#userB)" stroke-width="3"/>
    <circle cx="40" cy="30" r="7" fill="#FF4D6D"/>
    <path d="M28 46 q12 -8 24 0" fill="none" stroke="#FF4D6D" stroke-width="2.5"/>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="700">User B</text>
    <!-- progress bar -->
    <rect x="20" y="72" width="340" height="20" rx="10" fill="#06283c"/>
    <rect x="20" y="72" width="190" height="20" rx="10" fill="url(#userB)" opacity=".5"/>
    <text x="340" y="88" text-anchor="end" fill="#FF4D6D" font-size="15" font-weight="700">56%</text>
    <!-- tasks -->
    <g transform="translate(20,110)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#3DDC84" stroke-width="2"/>
      <path d="M16 21 l4 4 l8 -8" fill="none" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="42" y="14" width="180" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="110" height="6" rx="3" fill="#0f3f5c"/>
    </g>
    <g transform="translate(20,160)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#16557a" stroke-width="2"/>
      <rect x="42" y="14" width="150" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="90" height="6" rx="3" fill="#0f3f5c"/>
    </g>
    <g transform="translate(20,210)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#3DDC84" stroke-width="2"/>
      <path d="M16 21 l4 4 l8 -8" fill="none" stroke="#3DDC84" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="42" y="14" width="170" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="100" height="6" rx="3" fill="#0f3f5c"/>
    </g>
    <g transform="translate(20,260)">
      <rect x="0" y="0" width="340" height="42" rx="8" fill="#06283c"/>
      <rect x="12" y="12" width="18" height="18" rx="4" fill="none" stroke="#16557a" stroke-width="2"/>
      <rect x="42" y="14" width="130" height="8" rx="4" fill="#16557a"/>
      <rect x="42" y="26" width="80" height="6" rx="3" fill="#0f3f5c"/>
    </g>
  </g>

  <!-- sync icon between panels -->
  <g transform="translate(542,310)">
    <circle cx="28" cy="28" r="28" fill="#0a2f47" stroke="#2CACC9" stroke-width="2"/>
    <path d="M18 22 h20 l-6 -8 M38 34 h-20 l6 8" fill="none" stroke="#2CACC9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- FAST CHECK button -->
  <g transform="translate(440,520)">
    <rect x="0" y="0" width="320" height="60" rx="30" fill="#0a2f47" stroke="url(#check)" stroke-width="3"/>
    <circle cx="40" cy="30" r="14" fill="#3DDC84" opacity=".15"/>
    <circle cx="40" cy="30" r="8" fill="#3DDC84"/>
    <text x="170" y="38" text-anchor="middle" fill="#3DDC84" font-size="22" font-weight="700" letter-spacing="2">FAST CHECK</text>
  </g>

  <!-- title -->
  <text x="120" y="100" fill="#ffffff" font-size="58" font-weight="700">Couple Goals</text>
  <text x="123" y="595" fill="#2CACC9" font-size="26" font-weight="500" letter-spacing="1">Shared to-do list · real-time partner check-ins</text>
  <text x="123" y="630" fill="#6f97ab" font-size="20">Progress comparison, fast mutual updates, optional screen time monitoring</text>
</svg>
